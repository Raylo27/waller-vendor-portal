services:
  - type: web
    name: waller-portal-backend
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate --schema=../prisma/schema.prisma
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        value: waller-demo-secret-2026
      - key: DATABASE_URL
        fromDatabase:
          name: waller-portal-db
          property: connectionString

  - type: web
    name: waller-portal-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: waller-portal-backend
          type: web
          property: host

databases:
  - name: waller-portal-db
    plan: free